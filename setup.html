                { subdistrict_code: 4137, subdistrict_name: 'Chhatrapati Sambhajinagar', district_code: 469, district_name: 'Chhatrapati Sambhajinagar' },

                { village_code: 557015, village_name: 'Pachod', subdistrict_code: 4201, district_code: 466 }
            ]
        };

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `card ${type}`;
            statusDiv.innerHTML = `<h3>${type === 'success' ? '✅' : type === 'error' ? '❌' : '🔍'} ${message}</h3>`;
        }

        async function setupDatabase() {
            try {
                updateStatus('Testing Supabase connection...', 'info');
                
                // Test connection
                const { data, error } = await supabase.from('mh_districts').select('count').limit(1);
                
                if (error) {
                    updateStatus('Creating database schema...', 'info');
                    await createSchema();
                } else {
                    updateStatus('Connection successful! Checking data...', 'info');
                    await checkAndMigrateData();
                }
                
            } catch (error) {
                updateStatus(`Error: ${error.message}`, 'error');
            }
        }

        async function createSchema() {
            try {
                // Note: In a real scenario, you'd need admin privileges to create tables
                // For now, we'll show the SQL that needs to be run in Supabase SQL Editor
                updateStatus('Tables need to be created manually. Please run the SQL in Supabase SQL Editor.', 'info');
                
                const sql = `
-- DISTRICTS TABLE
CREATE TABLE IF NOT EXISTS mh_districts (
    id SERIAL PRIMARY KEY,
    district_code INTEGER NOT NULL UNIQUE,
    district_version INTEGER,
    district_name TEXT NOT NULL,
    state_code INTEGER NOT NULL DEFAULT 27,
    state_name TEXT NOT NULL DEFAULT 'Maharashtra',
    census_2001_code INTEGER,
    census_2011_code INTEGER,
    created_at TIMESTAMPTZ DEFAULT NOW()
);

-- SUBDISTRICTS TABLE
CREATE TABLE IF NOT EXISTS mh_subdistricts (
    id SERIAL PRIMARY KEY,
    subdistrict_code INTEGER NOT NULL UNIQUE,
    subdistrict_version INTEGER,
    subdistrict_name TEXT NOT NULL,
    district_code INTEGER NOT NULL REFERENCES mh_districts(district_code),
    district_name TEXT NOT NULL,
    census_2011_code TEXT,
    created_at TIMESTAMPTZ DEFAULT NOW()
);

-- VILLAGES TABLE
CREATE TABLE IF NOT EXISTS mh_villages (
    id SERIAL PRIMARY KEY,
    village_code BIGINT NOT NULL UNIQUE,
    village_version INTEGER,
    village_name TEXT NOT NULL,
    subdistrict_code INTEGER NOT NULL REFERENCES mh_subdistricts(subdistrict_code),
    district_code INTEGER NOT NULL REFERENCES mh_districts(district_code),
    created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Indexes
CREATE INDEX IF NOT EXISTS idx_mh_subdistricts_district ON mh_subdistricts(district_code);
CREATE INDEX IF NOT EXISTS idx_mh_villages_subdistrict ON mh_villages(subdistrict_code);
CREATE INDEX IF NOT EXISTS idx_mh_villages_district ON mh_villages(district_code);
CREATE INDEX IF NOT EXISTS idx_mh_villages_name ON mh_villages(village_name);

-- RLS Policies
ALTER TABLE mh_districts ENABLE ROW LEVEL SECURITY;
ALTER TABLE mh_subdistricts ENABLE ROW LEVEL SECURITY;
ALTER TABLE mh_villages ENABLE ROW LEVEL SECURITY;

CREATE POLICY "Public read access for districts" ON mh_districts FOR SELECT USING (true);
CREATE POLICY "Public read access for sub-districts" ON mh_subdistricts FOR SELECT USING (true);
CREATE POLICY "Public read access for villages" ON mh_villages FOR SELECT USING (true);
                `;
                
                document.getElementById('status').innerHTML += `
                    <h4>📋 SQL Schema:</h4>
                    <pre>${sql}</pre>
                    <p><strong>Steps:</strong></p>
                    <ol>
                        <li>Go to your Supabase project → SQL Editor</li>
                        <li>Copy and paste the SQL above</li>
                        <li>Click "Run" to create tables</li>
                        <li>Refresh this page to continue</li>
                    </ol>
                `;
                
            } catch (error) {
                updateStatus(`Schema creation error: ${error.message}`, 'error');
            }
        }

        async function checkAndMigrateData() {
            try {
                // Check existing data
                const [districts, subDistricts, villages] = await Promise.all([
                    supabase.from('mh_districts').select('*', { count: 'exact', head: true }),
                    supabase.from('mh_subdistricts').select('*', { count: 'exact', head: true }),
                    supabase.from('mh_villages').select('*', { count: 'exact', head: true })
                ]);
                
                const districtCount = districts.count || 0;
                const subDistrictCount = subDistricts.count || 0;
                const villageCount = villages.count || 0;
                
                if (districtCount === 0) {
                    updateStatus('Migrating sample data...', 'info');
                    await migrateData();
                } else {
                    updateStatus(`Data found: ${districtCount} districts, ${subDistrictCount} sub-districts, ${villageCount} villages`, 'success');
                    showActions();
                }
                
            } catch (error) {
                updateStatus(`Data check error: ${error.message}`, 'error');
            }
        }

        async function migrateData() {
            try {
                // Clear existing data
                await supabase.from('mh_villages').delete().neq('village_code', 0);
                await supabase.from('mh_subdistricts').delete().neq('subdistrict_code', 0);
                await supabase.from('mh_districts').delete().neq('district_code', 0);
                
                // Insert districts
                const { data: insertedDistricts } = await supabase
                    .from('mh_districts')
                    .insert(maharashtraData.districts)
                    .select();
                
                // Insert sub-districts
                const { data: insertedSubDistricts } = await supabase
                    .from('mh_subdistricts')
                    .insert(maharashtraData.subDistricts)
                    .select();
                
                // Insert villages
                const { data: insertedVillages } = await supabase
                    .from('mh_villages')
                    .insert(maharashtraData.villages)
                    .select();
                
                updateStatus(`Migration complete! ${insertedDistricts?.length} districts, ${insertedSubDistricts?.length} sub-districts, ${insertedVillages?.length} villages`, 'success');
                showActions();
                
            } catch (error) {
                updateStatus(`Migration error: ${error.message}`, 'error');
            }
        }

        function showActions() {
            document.getElementById('actions').style.display = 'block';
        }

        async function showHierarchy() {
            try {
                const { data: districts } = await supabase
                    .from('mh_districts')
                    .select(`
                        district_name,
                        mh_subdistricts(
                            subdistrict_name,
                            mh_villages(
                                village_name
                            )
                        )
                    `)
                    .order('district_name')
                    .limit(5);
                
                let hierarchyHTML = '';
                districts?.forEach((district, index) => {
                    hierarchyHTML += `<br><strong>${index + 1}. 📍 ${district.district_name}</strong><br>`;
                    
                    district.mh_subdistricts?.forEach((subDistrict, subIndex) => {
                        hierarchyHTML += `&nbsp;&nbsp;${index + 1}.${subIndex + 1} 🏘️ ${subDistrict.subdistrict_name}<br>`;
                        
                        subDistrict.mh_villages?.forEach((village, villageIndex) => {
                            hierarchyHTML += `&nbsp;&nbsp;&nbsp;&nbsp;${index + 1}.${subIndex + 1}.${villageIndex + 1} 🏡 ${village.village_name}<br>`;
                        });
                    });
                });
                
                document.getElementById('hierarchyContent').innerHTML = hierarchyHTML;
                document.getElementById('hierarchy').style.display = 'block';
                
            } catch (error) {
                alert('Error showing hierarchy: ' + error.message);
            }
        }

        function startApp() {
            alert('Perfect! Now run: npm run dev to start the Jal-Drishti application with live Maharashtra data!');
        }

        // Auto-start setup
        setupDatabase();
    </script>
</body>
</html>
